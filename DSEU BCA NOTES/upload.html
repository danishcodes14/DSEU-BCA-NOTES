<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body {
    background:
    radial-gradient(circle at top,
    #0f2d5f 0%,
    #09152f 35%,
    #050b18 75%,
    #02050d 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    padding: 0;
    overflow: hidden;
}
*{
    box-sizing: border-box;
}
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(250,204,21,0.2), transparent 70%);
    top: -100px;
    right: -100px;
    filter: blur(80px);
    z-index: 0;
}

input[type="text"] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    transition: all 0.3s ease;
    margin-bottom: 6px;
}

/* Hover effect */
input[type="text"]:hover {
    border-color: #facc15;
    background: rgba(250,204,21,0.08);
}

/* Focus (jab click kare user) */
input[type="text"]:focus {
    border-color: #facc15;
    background: rgba(250,204,21,0.12);
    box-shadow: 0 0 10px rgba(250,204,21,0.3);
}
.input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}
/* CARD */
.upload-container {
    width: 350px;
    padding: 25px;
    gap: 6px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    box-shadow: 0 0 50px rgba(0,0,0,0.6),rgba(255,255,21,0.2);
}

/* TITLE */
.upload-container h2 {
    margin-bottom: 8px;
     background: linear-gradient(90deg, #facc15, #fde047);
     background-clip: text;
     -webkit-background-clip: text;
    color: transparent;
}

.subtitle {
    font-size: 13px;
    color: #cbd5f5;
    opacity: 1;
    margin-bottom: 20px;
}

/* INPUT */
.upload-container input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.upload-box {
    border: 2px dashed rgba(255,255,255,0.3);
    padding: 30px;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    transition: all 0.3s ease;
}

.upload-box:hover {
    border-color: #facc15;
    background: rgba(250,204,21,0.1);
    transform: scale(1.02);
}

/* Drag active state */
.upload-box.dragover {
    border-color: #facc15;
    background: rgba(250,204,21,0.2);
    box-shadow: 0 0 25px rgba(250,204,21,0.3);
}

/* File name text */
#fileName {
    margin-top: 10px;
    font-size: 14px;
    color: #facc15;
}

/* BUTTONS */
.submit-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #facc15, #fde047);
    color: black;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
}


.submit-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(34,197,94,0.8);
}

.close-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
    background: transparent;
    border: 1px solid red;
    color: red;
    cursor: pointer;
}
.close-btn:hover {
  background: red;
  color: white;
}
.input-box {
    position: relative;
    margin-bottom: 2px;
}

.input-box i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #facc15;
}

.input-box input {
    width: 100%;
    padding: 12px 12px 12px 35px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
}
.upload-container {
    width: 350px;
    padding: 25px;
    border-radius: 15px;

    background: rgba(255, 255, 255, 0.08);   /* same glass */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border: 1px solid rgba(255, 255, 255, 0.15);

    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);  /* 👈 same as login */

    text-align: center;
}

</style>

</head>

<body>

<div class="upload-container">
    <h2>Upload Notes
    <i class="fa-solid fa-book"></i>
    </h2>
    <p class="subtitle">Share your study notes with others</p>

    <div class="input-box">
    <i class="fa-solid fa-user"></i>
    <input type="text" placeholder="Enter Student Name">
</div>

<div class="input-box">
    <i class="fa-solid fa-book"></i>
    <input type="text" placeholder="Enter Subject">
</div>

    <div class="upload-box" id="dropArea">
        <p id="uploadText">Drag & drop your file here</p>
        <span>or click to browse</span>
        <input type="file" id="fileInput"hidden>
    </div>
    <p id="fileName"></p>
    <form>

    <button class="submit-btn">
        <i class="fa-solid fa-paper-plane"></i> Submit
    </button>

    <button class="close-btn">
        <i class="fa-solid fa-xmark"></i> Close
    </button>
    </form>
</div>

<script>  
const dropArea = document.getElementById("dropArea");  
const fileInput = document.getElementById("fileInput");  
const fileName = document.getElementById("fileName");  
  
// click se file open  
dropArea.addEventListener("click", () => {  
    fileInput.click();  
});  
  
// file select hone par  
fileInput.addEventListener("change", () => {  
    fileName.textContent = fileInput.files[0].name;  
});  
  
// drag events  
dropArea.addEventListener("dragover", (e) => {  
    e.preventDefault();  
    dropArea.classList.add("dragover");  
});  
  
dropArea.addEventListener("dragleave", () => {  
    dropArea.classList.remove("dragover");  
});  
  
dropArea.addEventListener("drop", (e) => {  
    e.preventDefault();  
    dropArea.classList.remove("dragover");  
  
    const file = e.dataTransfer.files[0];  
    fileInput.files = e.dataTransfer.files;  
  
    fileName.textContent = file.name;  
});  
</script>

</body>
</html>
